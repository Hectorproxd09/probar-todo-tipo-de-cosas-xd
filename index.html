<style>
  body { margin: 0; font-family: sans-serif; overflow-x: hidden; }
  .screen { display: none; width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  .screen.active { display: block; }
  .bg-video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
</style>

<div id="screen-1" class="screen active" style="background: url('https://wallpapercave.com/wp/wp4389714.jpg') center/cover no-repeat;">
  <div class="el_1777925330218" onclick="goToScreen('screen-2')">asdfff</div>
</div>

<div id="screen-2" class="screen">
</div>

<script>
  function goToScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(id);
    if(target) target.classList.add('active');
  }
</script>
